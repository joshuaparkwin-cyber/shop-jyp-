<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 — SHOP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">SHOP</a>
      <nav id="main-nav"></nav>
    </div>
  </header>

  <div class="auth-page">
    <div class="auth-box">
      <h1 class="auth-title">회원가입</h1>

      <div class="form-group">
        <label class="form-label" for="input-id">아이디</label>
        <input class="form-input" type="text" id="input-id" placeholder="영문, 숫자 4~16자">
        <p class="form-error" id="error-id"></p>
      </div>

      <div class="form-group">
        <label class="form-label" for="input-pw">비밀번호</label>
        <input class="form-input" type="password" id="input-pw" placeholder="6자 이상">
        <p class="form-error" id="error-pw"></p>
      </div>

      <div class="form-group">
        <label class="form-label" for="input-pw2">비밀번호 확인</label>
        <input class="form-input" type="password" id="input-pw2" placeholder="비밀번호를 다시 입력하세요">
        <p class="form-error" id="error-pw2"></p>
      </div>

      <hr class="form-divider">

      <div class="form-group">
        <label class="form-label" for="input-name">이름</label>
        <input class="form-input" type="text" id="input-name" placeholder="홍길동">
        <p class="form-error" id="error-name"></p>
      </div>

      <div class="form-group">
        <label class="form-label" for="input-email">이메일</label>
        <input class="form-input" type="email" id="input-email" placeholder="example@email.com">
        <p class="form-error" id="error-email"></p>
      </div>

      <div class="form-group">
        <label class="form-label" for="input-phone">전화번호</label>
        <input class="form-input" type="tel" id="input-phone" placeholder="010-0000-0000">
      </div>

      <div class="form-group">
        <label class="form-label" for="input-address">주소</label>
        <input class="form-input" type="text" id="input-address" placeholder="배송받을 주소">
      </div>

      <button class="btn btn-primary" style="width:100%; margin-top:8px;" onclick="handleRegister()">가입하기</button>

      <p class="auth-link" style="margin-top:20px;">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>
    renderNav();

    // 이미 로그인 상태면 메인으로
    if (getCurrentUser()) location.href = 'index.html';

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    async function handleRegister() {
      const id      = document.getElementById('input-id').value.trim();
      const pw      = document.getElementById('input-pw').value;
      const pw2     = document.getElementById('input-pw2').value;
      const name    = document.getElementById('input-name').value.trim();
      const email   = document.getElementById('input-email').value.trim();
      const phone   = document.getElementById('input-phone').value.trim();
      const address = document.getElementById('input-address').value.trim();

      // 초기화
      ['error-id','error-pw','error-pw2','error-name','error-email'].forEach(e => showError(e, ''));

      let valid = true;

      if (!/^[a-zA-Z0-9]{4,16}$/.test(id)) {
        showError('error-id', '아이디는 영문, 숫자 4~16자로 입력해주세요.'); valid = false;
      }
      if (pw.length < 6) {
        showError('error-pw', '비밀번호는 6자 이상 입력해주세요.'); valid = false;
      }
      if (pw !== pw2) {
        showError('error-pw2', '비밀번호가 일치하지 않습니다.'); valid = false;
      }
      if (!name) {
        showError('error-name', '이름을 입력해주세요.'); valid = false;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('error-email', '올바른 이메일 형식을 입력해주세요.'); valid = false;
      }

      if (!valid) return;

      const btn = document.querySelector('.btn-primary');
      btn.disabled = true;
      btn.textContent = '처리 중...';

      const result = await registerUser(id, pw, { name, email, phone, address });
      if (result.success) {
        alert('회원가입이 완료되었습니다! 로그인해주세요.');
        location.href = 'login.html';
      } else {
        showError('error-id', result.message);
        btn.disabled = false;
        btn.textContent = '가입하기';
      }
    }
  </script>

</body>
</html>
