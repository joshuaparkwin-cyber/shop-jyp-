<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상품 상세</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">SHOP</a>
      <nav id="main-nav"></nav>
    </div>
  </header>

  <div class="product-detail">
    <div class="detail-img" id="detail-img"></div>
    <div>
      <h1 class="detail-name" id="detail-name"></h1>
      <p class="detail-price" id="detail-price"></p>
      <p class="detail-desc" id="detail-desc"></p>
      <div class="detail-actions">
        <button class="btn btn-primary" id="btn-cart">장바구니 담기</button>
        <button class="btn btn-secondary" onclick="location.href='cart.html'">장바구니로 이동</button>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2024 SHOP. All rights reserved.</p>
  </footer>

  <script src="products-data.js"></script>
  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const product = products.find(p => p.id === parseInt(params.get('id')));

    if (product) {
      document.title = product.name + ' — SHOP';
      document.getElementById('detail-img').style.backgroundColor = product.color;
      document.getElementById('detail-name').textContent = product.name;
      document.getElementById('detail-price').textContent = product.price.toLocaleString() + '원';
      document.getElementById('detail-desc').textContent = product.desc;
      document.getElementById('btn-cart').addEventListener('click', () => {
        addToCart(product.id);
        alert('장바구니에 담았습니다!');
        updateCartCount();
      });
    } else {
      // 잘못된 id 접근 시 메인으로 이동
      location.href = 'index.html';
    }

    renderNav();
  </script>

</body>
</html>
