<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — SHOP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">SHOP</a>
      <nav id="main-nav"></nav>
    </div>
  </header>

  <div class="auth-page">
    <div class="auth-box">
      <h1 class="auth-title">로그인</h1>

      <div class="form-group">
        <label class="form-label" for="input-id">아이디</label>
        <input class="form-input" type="text" id="input-id" placeholder="아이디를 입력하세요">
      </div>

      <div class="form-group">
        <label class="form-label" for="input-pw">비밀번호</label>
        <input class="form-input" type="password" id="input-pw" placeholder="비밀번호를 입력하세요">
      </div>

      <p class="form-error" id="login-error"></p>

      <button class="btn btn-primary" style="width:100%; margin-top:8px;" onclick="handleLogin()">로그인</button>

      <hr class="form-divider">

      <p class="auth-link">계정이 없으신가요? <a href="register.html">회원가입</a></p>
    </div>
  </div>

  <script src="products-data.js"></script>
  <script src="app.js"></script>
  <script>
    renderNav();

    // 이미 로그인 상태면 메인으로
    if (getCurrentUser()) location.href = 'index.html';

    // 엔터키로 로그인
    document.getElementById('input-pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    function handleLogin() {
      const id = document.getElementById('input-id').value.trim();
      const pw = document.getElementById('input-pw').value;
      const errorEl = document.getElementById('login-error');

      if (!id || !pw) {
        errorEl.textContent = '아이디와 비밀번호를 입력해주세요.';
        errorEl.style.display = 'block';
        return;
      }

      const result = loginUser(id, pw);
      if (result.success) {
        location.href = 'index.html';
      } else {
        errorEl.textContent = result.message;
        errorEl.style.display = 'block';
      }
    }
  </script>

</body>
</html>
