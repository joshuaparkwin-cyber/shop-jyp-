<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">SHOP</a>
      <nav id="main-nav"></nav>
    </div>
  </header>

  <section class="hero">
    <h1>신상품 입고</h1>
    <p>새롭게 준비된 상품들을 만나보세요</p>
  </section>

  <main class="container">
    <h2 class="section-title">전체 상품</h2>
    <div class="product-grid" id="product-grid"></div>
  </main>

  <footer>
    <p>© 2024 SHOP. All rights reserved.</p>
  </footer>

  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>
    async function init() {
      const products = await fetchProducts();
      const grid = document.getElementById('product-grid');
      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => location.href = `product.html?id=${p.id}`;
        card.innerHTML = `
          <div class="product-img" style="background-color: ${p.color}"></div>
          <p class="product-name">${p.name}</p>
          <p class="product-price">${p.price.toLocaleString()}원</p>
        `;
        grid.appendChild(card);
      });
      renderNav();
    }
    init();
  </script>

</body>
</html>
