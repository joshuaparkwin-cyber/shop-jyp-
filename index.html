<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">SHOP</a>
      <nav id="main-nav"></nav>
    </div>
  </header>

  <section class="hero">
    <h1>신상품 입고</h1>
    <p>새롭게 준비된 상품들을 만나보세요</p>
  </section>

  <main class="container">
    <div class="category-tabs">
      <button class="category-tab active" onclick="filterCategory('전체')">전체</button>
      <button class="category-tab" onclick="filterCategory('카테고리 1')">카테고리 1</button>
      <button class="category-tab" onclick="filterCategory('카테고리 2')">카테고리 2</button>
      <button class="category-tab" onclick="filterCategory('카테고리 3')">카테고리 3</button>
      <button class="category-tab" onclick="filterCategory('카테고리 4')">카테고리 4</button>
    </div>
    <div class="product-grid" id="product-grid"></div>
  </main>

  <footer>
    <p>© 2024 SHOP. All rights reserved.</p>
  </footer>

  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script src="chat-widget.js"></script>
  <script>
    let allProducts = [];
    let currentCategory = '전체';

    async function init() {
      allProducts = await fetchProducts();
      renderProducts(allProducts);
      renderNav();
    }

    function renderProducts(products) {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = '';

      if (products.length === 0) {
        grid.innerHTML = '<p style="color:#aaa; font-size:14px; padding:40px 0;">해당 카테고리에 상품이 없습니다.</p>';
        return;
      }

      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => location.href = `product.html?id=${p.id}`;
        card.innerHTML = `
          <div class="product-img" style="background-color: ${p.color}"></div>
          <p class="product-name">${p.name}</p>
          <p class="product-price">${p.price.toLocaleString()}원</p>
        `;
        grid.appendChild(card);
      });
    }

    function filterCategory(category) {
      currentCategory = category;

      document.querySelectorAll('.category-tab').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === category);
      });

      const filtered = category === '전체'
        ? allProducts
        : allProducts.filter(p => (p.category || '카테고리 1') === category);

      renderProducts(filtered);
    }

    init();
  </script>

</body>
</html>
